<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #17212b;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 15px;
            text-align: center;
        }
        .header-title {
            color: #64b5f6;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            margin-top: 10px;
        }

        /* ইংলিশে বড় এবং মোটা অক্ষরের নোটিশ স্টাইল */
        .notice-text {
            background: rgba(255, 152, 0, 0.15);
            border: 1px solid #ff9800;
            color: #ffb74d;
            font-size: 16px; /* বড় সাইজ */
            font-weight: 900; /* এক্সট্রা মোটা (Bold) */
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 25px;
            line-height: 1.4;
            text-transform: uppercase; /* সব বড় হাতের অক্ষর */
        }
        
        /* পোস্ট স্টাইল */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .post-card {
            background: #24313f;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #2b394a;
            cursor: pointer;
            text-align: left;
        }
        .post-title {
            font-size: 16px;
            color: #fff;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .btn-ad {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .btn-video {
            background-color: #4caf50 !important;
        }

        /* কাস্টম অ্যাড স্ক্রিন */
        .ad-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #182533 url('https://i.postimg.cc/85zXvF9p/telegram-bg.jpg') repeat;
            z-index: 100000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
        }
        
        .ad-top-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-top: 20px;
        }
        .ad-timer {
            background: #24303f;
            color: #fff;
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #2b394a;
        }
        .ad-close-btn {
            background: #24303f;
            color: #fff;
            border: 1px solid #2b394a;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: none;
            line-height: 33px;
            text-align: center;
            position: absolute;
            right: 0;
        }
        
        .fake-chat-box {
            background: rgba(36, 49, 63, 0.95);
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: left;
            border: 1px solid #2b394a;
            margin-top: -50px;
        }
        .profile-info {
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
            font-size: 18px;
        }
        .amount-info {
            font-size: 16px;
            color: #b0bec5;
            margin-bottom: 25px;
        }
        .monetag-tag {
            font-size: 13px;
            color: #78909c;
            text-align: center;
            margin-bottom: 10px;
        }
        .btn-reward-link {
            background: #224c32;
            color: #81c784;
            padding: 14px;
            border-radius: 25px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #2e7d32;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .bottom-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }
        .btn-continue {
            background: #2b577e;
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            border: none;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-title">Premium Video Link</div>
        
        <div class="notice-text">
            ⚠️ NOTICE: AFTER OPENING THE AD, WAIT 15 SECONDS THERE, THEN PRESS THE PHONE'S BACK BUTTON TO RETURN AND UNLOCK THE VIDEO!
        </div>

        <div class="post-list">
            <div class="post-card" onclick="openSecureAd(1)">
                <div class="post-title">Ridhi Viral Video Link (HD)</div>
                <button class="btn-ad" id="btn-1" onclick="event.stopPropagation(); openSecureAd(1);">Watch Ads (3/3)</button>
            </div>
        </div>
    </div>

    <div class="ad-modal-overlay" id="adModal">
        <div class="ad-top-container">
            <div class="ad-timer" id="adTimer">00:15</div>
            <button class="ad-close-btn" id="adCloseBtn" onclick="closeSecureAd()">×</button>
        </div>
        
        <div class="fake-chat-box">
            <div class="profile-info">+880 1817 529364</div>
            <div class="amount-info">৳ ৫০,০০</div>
            <div class="monetag-tag">ads by Monetag</div>
            <div onclick="redirectToAd()" class="btn-reward-link">
                <span>✓</span> Click to get the reward!
            </div>
        </div>

        <div class="bottom-container">
            <button onclick="redirectToAd()" class="btn-continue">Continue</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let adCountTracker = { 1: 3 };
        let currentPost = null;
        let adTimerInterval = null;
        let adClickTime = 0; // বিজ্ঞাপন ক্লিকের সময় ট্র্যাক করার জন্য ভেরিয়েবল
        
        const monetizationLink = "https://woofbeginner.com/mb5232yg?key=478ed8ea2b236efd5caa539309a8b269";
        const finalTargetVideo = "https://terasharefile.com/s/1Z5chlLtRw8ItzAvM8eulGA";

        function openSecureAd(postId) {
            currentPost = postId;
            let currentCount = adCountTracker[postId];

            if (currentCount <= 0) {
                tg.openLink(finalTargetVideo);
                return;
            }

            startInSiteTimer();
            
            // বিজ্ঞাপন ওপেন করার সময়টি মিলিসেকেন্ডে সেভ করে রাখা হচ্ছে
            adClickTime = new Date().getTime();
            
            setTimeout(() => {
                tg.openLink(monetizationLink);
            }, 500);
        }

        function redirectToAd() {
            adClickTime = new Date().getTime(); // কন্টিনিউ বাটনে চাপ দিলেও টাইম আপডেট হবে
            tg.openLink(monetizationLink);
        }

        function startInSiteTimer() {
            const modal = document.getElementById('adModal');
            const timerDisplay = document.getElementById('adTimer');
            const closeBtn = document.getElementById('adCloseBtn');
            
            modal.style.display = 'flex';
            timerDisplay.style.display = 'block';
            closeBtn.style.display = 'none';
            
            let secondsRemaining = 15;
            timerDisplay.innerText = `00:${secondsRemaining < 10 ? '0' : ''}${secondsRemaining}`;

            adTimerInterval = setInterval(() => {
                secondsRemaining--;
                timerDisplay.innerText = `00:${secondsRemaining < 10 ? '0' : ''}${secondsRemaining}`;

                if (secondsRemaining <= 0) {
                    clearInterval(adTimerInterval);
                    timerDisplay.style.display = 'none';
                    closeBtn.style.display = 'block'; 
                }
            }, 1000);
        }

        function closeSecureAd() {
            clearInterval(adTimerInterval);
            document.getElementById('adModal').style.display = 'none';

            if (currentPost) {
                let currentTime = new Date().getTime();
                // ইউজার কত সেকেন্ড বাইরে ছিল তা হিসাব করা হচ্ছে
                let secondsSpentOutside = (currentTime - adClickTime) / 1000;

                // ইউজার যদি ১৫ সেকেন্ড বা তার বেশি সময় বাইরে কাটিয়ে ফিরে আসে, তবেই কাউন্ট কমবে
                if (secondsSpentOutside >= 15) {
                    if (adCountTracker[currentPost] > 0) {
                        adCountTracker[currentPost]--;
                    }
                } else {
                    // ১৫ সেকেন্ডের কম থাকলে টেলিগ্রামে এলার্ট পপ-আপ দেখাবে
                    tg.showAlert("Please wait at least 15 seconds on the ad page to unlock!");
                }

                let remaining = adCountTracker[currentPost];
                let actionButton = document.getElementById(`btn-${currentPost}`);
                
                if (remaining > 0) {
                    // ৩ টি বিজ্ঞপ্তির মধ্যে বাকি কয়টি দেখতে হবে তা ডাইনামিকালি সেট হবে (যেমন: 3/2, 3/1)
                    actionButton.innerText = `Watch Ads (3/${remaining})`;
                } else {
                    actionButton.innerText = "Watch Video";
                    actionButton.classList.add("btn-video");
                }
            }
        }
    </script>
</body>
</html>
